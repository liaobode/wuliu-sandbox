<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 输送机仿真沙盒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111827; }
        canvas {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.2);
            background-color: #ffffff;
            border-radius: 8px;
            cursor: crosshair;
        }
        .tool-btn { transition: all 0.2s; }
        .tool-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .kbd { display: inline-block; padding: 1px 5px; font-size: 10px; font-family: monospace; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 3px; color: #374151; }
    </style>
</head>
<body class="flex flex-col h-screen text-gray-800 font-sans">

    <!-- 顶部区域 -->
    <header class="bg-white border-b border-gray-200 shadow-sm flex-shrink-0">
        <!-- 标题栏 -->
        <div class="flex items-center justify-between px-4 py-2">
            <h1 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                物流仿真沙盒
            </h1>
            <div class="flex items-center gap-3">
                <button id="btn-play" class="flex items-center justify-center gap-1 px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 font-bold shadow-md transition-colors text-sm">
                    ▶️ 开始运行
                </button>
                <button id="btn-stop" class="hidden flex items-center justify-center gap-1 px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 font-bold shadow-md transition-colors text-sm">
                    ⏹️ 结束并统计
                </button>
                <div class="flex items-center gap-1 text-sm">
                    <span class="text-gray-500">速度:</span>
                    <input type="number" id="speed-input" min="0.1" max="1000" step="0.1" value="1.0" class="w-14 px-1 text-right border border-gray-200 rounded text-green-600 font-medium focus:outline-none focus:border-green-500 bg-white text-sm">
                    <span class="text-green-600 font-medium">x</span>
                </div>
                <button id="btn-help" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg text-lg" title="快捷键帮助 (?)">?</button>
            </div>
        </div>
        <!-- 工具栏 -->
        <div class="flex items-center gap-1 px-4 py-2 border-t border-gray-100 bg-gray-50">
            <!-- 输送带方向 -->
            <button class="tool-btn active flex items-center justify-center w-10 h-10 border border-gray-200 rounded-lg hover:bg-gray-50 text-lg" data-tool="conveyor-1" title="向右输送 (1)">➡️</button>
            <button class="tool-btn flex items-center justify-center w-10 h-10 border border-gray-200 rounded-lg hover:bg-gray-50 text-lg" data-tool="conveyor-2" title="向下输送 (2)">⬇️</button>
            <button class="tool-btn flex items-center justify-center w-10 h-10 border border-gray-200 rounded-lg hover:bg-gray-50 text-lg" data-tool="conveyor-3" title="向左输送 (3)">⬅️</button>
            <button class="tool-btn flex items-center justify-center w-10 h-10 border border-gray-200 rounded-lg hover:bg-gray-50 text-lg" data-tool="conveyor-4" title="向上输送 (4)">⬆️</button>
            <div class="w-px h-8 bg-gray-200 mx-1"></div>
            <!-- 其他工具 -->
            <button class="tool-btn flex items-center justify-center w-10 h-10 border border-cyan-100 rounded-lg hover:bg-cyan-50 text-lg" data-tool="diverter" title="分流器 (D)">🔀</button>
            <button class="tool-btn flex items-center justify-center w-10 h-10 border border-gray-200 rounded-lg hover:bg-gray-50 text-lg" data-tool="spawner" title="发货机 (F)">🏭</button>
            <button class="tool-btn flex items-center justify-center w-10 h-10 border border-green-100 rounded-lg hover:bg-green-50 text-lg" data-tool="receiver" title="收货站 (R)">📥</button>
            <button class="tool-btn flex items-center justify-center w-10 h-10 border border-gray-200 rounded-lg hover:bg-gray-50" data-tool="box" title="手动放货 (B)">
                <div class="w-5 h-5 bg-amber-500 border border-amber-700 rounded-sm"></div>
            </button>
            <button class="tool-btn flex items-center justify-center w-10 h-10 border border-red-100 rounded-lg hover:bg-red-50 text-lg text-red-600" data-tool="eraser" title="橡皮擦 (E)">🧹</button>
            <div class="w-px h-8 bg-gray-200 mx-1"></div>
            <!-- 预设模板 -->
            <select id="preset-select" class="px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:border-blue-400">
                <option value="">— 预设模板 —</option>
                <option value="straight">→ 直线输送</option>
                <option value="l-turn">↳ L型转弯</option>
                <option value="u-turn">↩ U型回绕</option>
                <option value="split">🔀 分流合流</option>
            </select>
        </div>
    </header>

    <!-- 主内容区域 -->
    <div class="flex flex-1 overflow-hidden">
        <!-- 左侧面板 -->
        <aside class="w-52 bg-white border-r border-gray-200 overflow-y-auto flex-shrink-0">
            <div class="p-4">
                <!-- 建造设置 -->
                <h2 class="text-xs font-semibold text-gray-500 mb-3">建造设置</h2>
                <div class="flex flex-col gap-3 mb-6 p-3 bg-gray-50 rounded-lg border border-gray-200">
                    <div>
                        <label class="text-xs text-gray-500 flex justify-between">
                            <span>铺设长度</span>
                            <span id="build-length-val" class="font-medium">1</span>
                        </label>
                        <input type="range" id="build-length" min="1" max="16" value="1" class="w-full mt-1 accent-blue-500">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 flex justify-between items-center">
                            <span>速度 (m/min)</span>
                            <input type="number" id="build-speed-input" min="1" max="600" step="1" value="60" class="w-12 px-1 text-right border border-gray-200 rounded text-amber-600 font-medium focus:outline-none focus:border-amber-500 bg-white text-xs">
                        </label>
                        <input type="range" id="build-speed" min="10" max="240" step="10" value="60" class="w-full mt-1 accent-amber-500">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 flex justify-between items-center">
                            <span>发货间隔 (秒)</span>
                            <div class="flex items-center gap-1">
                                <input type="number" id="build-interval-input" min="0.1" max="60" step="0.1" value="1.0" class="w-12 px-1 text-right border border-gray-200 rounded text-emerald-600 font-medium focus:outline-none focus:border-emerald-500 bg-white text-xs">
                            </div>
                        </label>
                        <input type="range" id="build-interval" min="0.1" max="20" step="0.1" value="1" class="w-full mt-1 accent-emerald-500">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 flex justify-between items-center">
                            <span>移载时间 (秒)</span>
                            <div class="flex items-center gap-1">
                                <input type="number" id="build-transfer-input" min="0.0" max="10" step="0.5" value="2.0" class="w-12 px-1 text-right border border-gray-200 rounded text-purple-600 font-medium focus:outline-none focus:border-purple-500 bg-white text-xs">
                            </div>
                        </label>
                        <input type="range" id="build-transfer" min="0" max="10" step="0.5" value="2" class="w-full mt-1 accent-purple-500">
                    </div>
                </div>

                <!-- 数据管理 -->
                <h2 class="text-xs font-semibold text-gray-500 mb-3">数据管理</h2>
                <div class="flex flex-col gap-2 mb-6">
                    <div class="flex gap-2">
                        <button id="btn-save" class="flex-1 flex items-center justify-center gap-1 p-2 text-sm text-teal-600 hover:bg-teal-50 rounded-lg border border-teal-100 transition-colors">
                            💾 保存
                        </button>
                        <button id="btn-load" class="flex-1 flex items-center justify-center gap-1 p-2 text-sm text-teal-600 hover:bg-teal-50 rounded-lg border border-teal-100 transition-colors">
                            📂 加载
                        </button>
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-export" class="flex-1 flex items-center justify-center gap-1 p-2 text-xs text-violet-600 hover:bg-violet-50 rounded-lg border border-violet-100 transition-colors">
                            📤 导出
                        </button>
                        <button id="btn-import" class="flex-1 flex items-center justify-center gap-1 p-2 text-xs text-violet-600 hover:bg-violet-50 rounded-lg border border-violet-100 transition-colors">
                            📥 导入
                        </button>
                        <input type="file" id="import-file" accept=".json" class="hidden">
                    </div>
                    <div class="flex flex-col gap-1 mt-1">
                        <button id="btn-clear-items" class="flex items-center justify-center gap-1 p-2 text-xs text-amber-600 hover:bg-amber-50 rounded-lg border border-amber-100 transition-colors">
                            📦 清理货物
                        </button>
                        <button id="btn-clear-conveyors" class="flex items-center justify-center gap-1 p-2 text-xs text-blue-600 hover:bg-blue-50 rounded-lg border border-blue-100 transition-colors">
                            🛤️ 清理输送机
                        </button>
                        <button id="btn-clear-all" class="flex items-center justify-center gap-1 p-2 text-xs text-gray-500 hover:text-red-500 hover:bg-gray-100 rounded-lg border border-gray-100 transition-colors">
                            🗑️ 清空所有
                        </button>
                    </div>
                </div>

                <!-- 显示选项 -->
                <h2 class="text-xs font-semibold text-gray-500 mb-3">显示选项</h2>
                <div class="mb-6">
                    <button id="btn-heatmap" class="w-full flex items-center justify-center gap-2 p-2 text-sm text-orange-600 hover:bg-orange-50 rounded-lg border border-orange-100 transition-colors">
                        🗺️ 热力图: 关
                    </button>
                </div>
            </div>
        </aside>

        <!-- 画布区域 -->
        <main class="flex-1 flex items-center justify-center bg-gray-900">
            <canvas id="sim-canvas"></canvas>
        </main>
    </div>

    <!-- 快捷键帮助面板 -->
    <div id="help-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
        <div class="absolute inset-0 bg-black/50" id="help-backdrop"></div>
        <div class="relative bg-white rounded-xl shadow-2xl p-6 max-w-md mx-4">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">⌨️ 快捷键帮助</h2>
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div>
                    <h3 class="font-semibold text-gray-500 mb-2">工具选择</h3>
                    <div class="space-y-1 text-gray-700">
                        <p><span class="kbd">1</span> 向右输送</p>
                        <p><span class="kbd">2</span> 向下输送</p>
                        <p><span class="kbd">3</span> 向左输送</p>
                        <p><span class="kbd">4</span> 向上输送</p>
                        <p><span class="kbd">D</span> 分流器</p>
                        <p><span class="kbd">F</span> 发货机</p>
                        <p><span class="kbd">R</span> 收货站</p>
                        <p><span class="kbd">B</span> 手动放货</p>
                        <p><span class="kbd">E</span> 橡皮擦</p>
                    </div>
                </div>
                <div>
                    <h3 class="font-semibold text-gray-500 mb-2">仿真控制</h3>
                    <div class="space-y-1 text-gray-700">
                        <p><span class="kbd">Space</span> 暂停/继续</p>
                        <p><span class="kbd">S</span> 保存布局</p>
                        <p><span class="kbd">⌘Z</span> 撤销</p>
                    </div>
                    <h3 class="font-semibold text-gray-500 mb-2 mt-4">其他</h3>
                    <div class="space-y-1 text-gray-700">
                        <p><span class="kbd">?</span> 显示帮助</p>
                        <p><span class="kbd">ESC</span> 关闭面板</p>
                    </div>
                </div>
            </div>
            <p class="text-xs text-gray-400 mt-4 text-center">按 ? 或 ESC 关闭</p>
        </div>
    </div>

    <!-- 仿真数据报告浮动面板 -->
    <div id="stats-modal" class="hidden fixed inset-0 z-40 flex items-start justify-center pt-20">
        <div class="absolute inset-0 bg-black/30" id="stats-backdrop"></div>
        <div class="relative bg-white rounded-xl shadow-2xl p-6 min-w-80 mx-4">
            <button id="stats-close" class="absolute top-3 right-3 w-6 h-6 flex items-center justify-center text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded">✕</button>
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">📊 仿真数据报告</h2>
            <div class="space-y-2 text-sm">
                <p class="flex justify-between">运行耗时: <span id="stat-time" class="font-bold">0.0</span> 秒</p>
                <p class="flex justify-between">完成输送: <span id="stat-count" class="font-bold">0</span> 个货物</p>
                <p class="flex justify-between items-center pt-2 border-t">
                    <span>吞吐率:</span>
                    <span id="stat-rate" class="text-xl font-black text-indigo-600">0.00</span> 个/秒
                </p>
                <div id="stat-receivers" class="pt-2 border-t text-xs"></div>
            </div>
            <button id="stats-ok" class="mt-4 w-full py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition-colors font-medium">确定</button>
        </div>
    </div>

    <!-- 模块化构建后的 JS -->
    <script src="dist/bundle.js"></script>
</body>
</html>
